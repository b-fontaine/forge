# <!-- Audit: B.5.1 (b5-1-init-wizard) -->
#
# Authoritative archetype registry for `forge init`. Maps each
# archetype name to its scaffolder script + signals + metadata.
# Read at runtime by the TS dispatcher (cli/src/commands/init.ts)
# AND by `forge-init-<archetype>.sh` wrappers when they exist.
#
# Adding a new archetype = (1) appending one entry here +
# (2) writing the corresponding `bin/forge-init-<archetype>.sh`
# wrapper following the stable ABI declared in
# `global/scaffolding.md`. NO edit to the TS dispatcher needed.
#
# Schema (per FR-IW-002 of b5-1-init-wizard) :
#   name        : string, MUST equal the map key.
#   scaffolder  : "<built-in>" | shell-script path relative to repo root.
#   description : human-readable one-line summary.
#   signals     : list of file paths (relative to target dir) that
#                 suggest this archetype during --auto detection.
#   since       : SemVer of the framework version that registered
#                 this archetype.

archetypes:
  default:
    name: default
    scaffolder: "<built-in>"
    description: "Minimal Forge install — copy framework assets only, no language scaffold."
    signals: []
    since: "0.1.0"

  full-stack-monorepo:
    name: full-stack-monorepo
    scaffolder: "bin/forge-init-fsm.sh"
    description: "Flutter frontend + Rust backend + Infra (Kustomize / Kong / OTel) with protos as single source of truth."
    signals:
      - pubspec.yaml
      - Cargo.toml
    since: "1.0.0"

  mobile-only:
    name: mobile-only
    scaffolder: "bin/forge-init-mobile-only.sh"
    description: "Flutter iOS + Android with OIDC (flutter_appauth) + secure storage + biometric + App Attest / Play Integrity + Fastlane. No backend, no BaaS."
    signals:
      - pubspec.yaml
      - ios/Runner/Info.plist
      - android/app/build.gradle
    since: "1.2.0"
    # T.4 (t4-adr-ratification, 2026-05-04) — RENAMED to mobile-pwa-first.
    # `mobile-only / 1.0.0` becomes a legacy compat alias. The full rename
    # + Qwik PWA channel ships in B.9 (T8). Until then, scaffolds initiated
    # here continue to produce the v0.3.0 mobile-only tree byte-equivalent.
    status: legacy_alias
    target: mobile-pwa-first
    migration: "B.9 (T8) — bin/forge-migrate-mobile-pwa.sh"

  # ─── Removed from taxonomy (t4-adr-ratification, 2026-05-04) ────
  # `flutter-firebase` was a placeholder slot for archetype B.2 in the
  # original audit roadmap (`il-s-agit-l-d-un-noble-gem.md`). Per ADR-007
  # of `docs/ARCHITECTURE-TARGET.md`, Schrems II + CLOUD Act make Firebase
  # incompatible with Forge's EU/premium positioning. The archetype is
  # REMOVED from the roadmap. Adopters who need Firebase keep the `default`
  # archetype as a starting point. See CHANGELOG.md and
  # `docs/ARCHETYPES.md` for the public communication.
  #
  # The placeholder is annotated here (NOT removed) to preserve the
  # `forge upgrade` history slot for any adopter who may have previously
  # invoked `forge init --archetype flutter-firebase` (no scaffold ever
  # produced — the placeholder was inactive).
  flutter-firebase:
    name: flutter-firebase
    scaffolder: "<removed>"
    description: "REMOVED — Schrems II + CLOUD Act incompatible with Forge EU positioning (ADR-007)."
    signals: []
    since: "0.0.0"
    status: removed_from_roadmap
    reason: "Schrems II + CLOUD Act per ADR-007 (t4-adr-ratification, 2026-05-04)"
