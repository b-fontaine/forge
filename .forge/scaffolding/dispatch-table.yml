# <!-- Audit: B.5.1 (b5-1-init-wizard) -->
#
# Authoritative archetype registry for `forge init`. Maps each
# archetype name to its scaffolder script + signals + metadata.
# Read at runtime by the TS dispatcher (cli/src/commands/init.ts)
# AND by `forge-init-<archetype>.sh` wrappers when they exist.
#
# Adding a new archetype = (1) appending one entry here +
# (2) writing the corresponding `bin/forge-init-<archetype>.sh`
# wrapper following the stable ABI declared in
# `global/scaffolding.md`. NO edit to the TS dispatcher needed.
#
# Schema (per FR-IW-002 of b5-1-init-wizard) :
#   name        : string, MUST equal the map key.
#   scaffolder  : "<built-in>" | shell-script path relative to repo root.
#   description : human-readable one-line summary.
#   signals     : list of file paths (relative to target dir) that
#                 suggest this archetype during --auto detection.
#   since       : SemVer of the framework version that registered
#                 this archetype.

archetypes:
  default:
    name: default
    scaffolder: "<built-in>"
    description: "Minimal Forge install — copy framework assets only, no language scaffold."
    signals: []
    since: "0.1.0"

  full-stack-monorepo:
    name: full-stack-monorepo
    scaffolder: "bin/forge-init-fsm.sh"
    description: "Flutter frontend + Rust backend + Infra (Kustomize / Envoy Gateway / OTel) with protos as single source of truth."
    signals:
      - pubspec.yaml
      - Cargo.toml
    since: "1.0.0"
    # B.8.14 (b8-14-promotion-flip, C2) — VERSIONED SCAFFOLDER ROUTING.
    # `scaffolder` above is the 1.0.0 default. At `forge init` the CLI resolves the
    # highest `stage: stable` + `scaffoldable: true` schema under
    # `.forge/schemas/full-stack-monorepo/` (cli/src/domain/schema-version.ts) and,
    # when a `bin/forge-init-fsm-<version>.sh` wrapper exists, routes to it. Today
    # the 2.0.0 schema is promoted, so a fresh init runs `bin/forge-init-fsm-2.0.0.sh`
    # → the Kong-less / Envoy Gateway tree (Constitution v2.0.0 §VIII.1). A schema
    # whose only versions are non-scaffoldable (candidate/draft) is REFUSED (exit 3,
    # the deferred B.8.3.b guard). The convention avoids per-version fields in this
    # hand-rolled YAML subset (cli/src/domain/dispatch-table.ts); see b8-14-flip.test.sh.

  mobile-only:
    name: mobile-only
    scaffolder: "bin/forge-init-mobile-only.sh"
    description: "Flutter iOS + Android with OIDC (flutter_appauth) + secure storage + biometric + App Attest / Play Integrity + Fastlane. No backend, no BaaS."
    signals:
      - pubspec.yaml
      - ios/Runner/Info.plist
      - android/app/build.gradle
    since: "1.2.0"
    # T.4 (t4-adr-ratification, 2026-05-04) — RENAMED to mobile-pwa-first.
    # `mobile-only / 1.0.0` becomes a legacy compat alias. The full rename
    # + Qwik PWA channel ships in B.9 (T8). Until then, scaffolds initiated
    # here continue to produce the v0.3.0 mobile-only tree byte-equivalent.
    status: legacy_alias
    target: mobile-pwa-first
    migration: "B.9 (T8) — bin/forge-migrate-mobile-pwa.sh"

  ai-native-rag:
    name: ai-native-rag
    scaffolder: "bin/forge-init-ai-native-rag.sh"
    description: "AI-first RAG archetype — pgvector + LLM gateway (Mistral-EU / vLLM) + MCP servers + Qwik streaming UI. Promoted to stable/scaffoldable in B.7.6 (b7-6-harness)."
    signals: []
    since: "0.5.0"
    # B.7.2a (b7-2a-dispatch-register) registered the entry; B.7.6 (b7-6-harness)
    # PROMOTED the 1.0.0 schema to `stage: stable` / `scaffoldable: true` (after the
    # ≥35-test promotion suite + the harness-rust live-codegen CI gate). `forge init
    # --archetype ai-native-rag` now renders the tree (it no longer refuses exit 3),
    # and the archetype joins the cli-trust scaffold matrix
    # (cli/test/e2e/archetype-fixtures/ai-native-rag.yml, FR-T51-055 — toolchain-gated
    # on buf+cargo, so skipped where they are absent). The `status:` field below is
    # the matrix marker (archetypes-smoke.test.ts + t5-1.test.sh T-016 gate on
    # `status != candidate`); flipped candidate→stable in lockstep with the promotion.
    # Resolves b7-1-schema Q-005. `since: 0.5.0` per VERSIONING.md (new archetype ⇒ MINOR).
    status: stable

  event-driven-eu:
    name: event-driven-eu
    scaffolder: "bin/forge-init-event-driven-eu.sh"
    description: "EU-sovereign event-driven archetype — NATS JetStream + Temporal saga orchestration + AsyncAPI 3.1 + Postgres event store, on a Rust axum/Connect backend. Promoted to stable/scaffoldable in B.6.7 (b6-7-harness)."
    signals: []
    since: "0.6.0"
    # B.6.2 (b6-2-scaffolder) registered this entry + shipped the templates + the
    # gated wrapper (bin/forge-init-event-driven-eu.sh) + the verify-then-pin'd
    # backend; B.6.7 (b6-7-harness) PROMOTED the 1.0.0 schema to `stage: stable` /
    # `scaffoldable: true` (after the ≥35-test promotion suite + the harness-rust
    # live `buf build`/`cargo test` CI gate). `forge init --archetype event-driven-eu`
    # now renders the tree (it no longer refuses exit 3 — selectScaffoldableVersion
    # returns 1.0.0), and the archetype joins the cli-trust scaffold matrix
    # (cli/test/e2e/archetype-fixtures/event-driven-eu.yml, FR-T51-055 — toolchain-gated
    # on cargo+buf, so skipped where they are absent). The `status:` field below is the
    # matrix marker (archetypes-smoke.test.ts + t5-1.test.sh T-016 gate on
    # `status != candidate`); flipped candidate→stable in lockstep with the promotion.
    # `since: 0.6.0` per VERSIONING.md (new archetype ⇒ MINOR; next after the 0.5.0
    # ai-native-rag cut).
    status: stable

  # ─── Removed from taxonomy (t4-adr-ratification, 2026-05-04) ────
  # `flutter-firebase` was a placeholder slot for archetype B.2 in the
  # original audit roadmap (`il-s-agit-l-d-un-noble-gem.md`). Per ADR-007
  # of `docs/ARCHITECTURE-TARGET.md`, Schrems II + CLOUD Act make Firebase
  # incompatible with Forge's EU/premium positioning. The archetype is
  # REMOVED from the roadmap. Adopters who need Firebase keep the `default`
  # archetype as a starting point. See CHANGELOG.md and
  # `docs/ARCHETYPES.md` for the public communication.
  #
  # The placeholder is annotated here (NOT removed) to preserve the
  # `forge upgrade` history slot for any adopter who may have previously
  # invoked `forge init --archetype flutter-firebase` (no scaffold ever
  # produced — the placeholder was inactive).
  flutter-firebase:
    name: flutter-firebase
    scaffolder: "<removed>"
    description: "REMOVED — Schrems II + CLOUD Act incompatible with Forge EU positioning (ADR-007)."
    signals: []
    since: "0.0.0"
    status: removed_from_roadmap
    reason: "Schrems II + CLOUD Act per ADR-007 (t4-adr-ratification, 2026-05-04)"

# ── Forbidden archetypes (J.8 j8-janus-rules — runtime refusal list) ──
# Top-level list consulted by:
#   - cli/src/commands/init-archetype.ts (TS dispatcher, first line of defense)
#   - bin/_forge-init-helpers.sh::_refuse_if_forbidden (wrapper-side defense in depth)
#
# Rule catalogue documented in:
#   - .claude/agents/cross-layer-orchestrator.md "Forbidden archetypes & combinations"
#   - .forge/standards/global/janus-orchestration-rules.md
#
# Refusal exit code: 3 (policy violation per ADR-J8-003).
# Refusal stderr format: [REFUSAL: <archetype>: <rule_id>: <reason> ; alternative: <alt>]

forbidden_archetypes:
  - name: flutter-firebase
    reason: "Schrems II + CLOUD Act incompatibles avec positionnement EU/premium Forge"
    since: "0.4.0-rc.1"
    alternative: "default archetype + add Firebase as adopter-managed overlay (out of Forge scope)"
    rule_id: J8-RULE-001

# ── Forbidden combinations (J.8.c b7-9-janus-ai — provider × tier refusals) ──
# <!-- Audit: B.7.9 + J.8.c (b7-9-janus-ai) -->
# Sibling list to forbidden_archetypes: above. Where forbidden_archetypes:
# refuses a whole archetype, this list refuses a provider × tier COMBINATION
# WITHIN a permitted archetype (ai-native-rag is permitted; a non-sovereign
# LLM provider within it is not). Foreseen by
# global/janus-orchestration-rules.md "Extending the catalogue" step 1.
#
# Consumed by:
#   - bin/_forge-init-helpers.sh::_refuse_if_forbidden_combination
#     (wrapper-side defense in depth, invoked by forge-init-ai-native-rag.sh)
#
# Entry shape (7 keys): archetype / provider / tier / reason / since /
#   alternative / rule_id. `tier: any` fires regardless of declared tier
#   (a default-provider refusal — never a valid tier value); `tier: T3`
#   fires only when the resolved tier equals T3.
#
# Refusal exit code: 3 (policy violation per ADR-J8-003).
# Refusal stderr format:
#   [REFUSAL: <archetype>/<provider>@<tier>: <rule_id>: <reason> ; alternative: <alt>]

forbidden_combinations:
  - archetype: ai-native-rag
    provider: vertex-ai
    tier: any            # fires regardless of declared tier (never a valid default)
    reason: "Vertex AI = GCP-managed inference ; CLOUD Act incompatible with EU/premium positioning"
    since: "0.5.0"
    alternative: "Mistral-EU (Mistral on Scaleway) or self-hosted vLLM ; OpenAI/Anthropic via EU-jurisdiction gateway at T1 only"
    rule_id: J8-RULE-004
  - archetype: ai-native-rag
    provider: bedrock
    tier: any
    reason: "AWS Bedrock = AWS-managed inference ; CLOUD Act incompatible with EU/premium positioning"
    since: "0.5.0"
    alternative: "Mistral-EU (Mistral on Scaleway) or self-hosted vLLM ; OpenAI/Anthropic via EU-jurisdiction gateway at T1 only"
    rule_id: J8-RULE-005
  - archetype: ai-native-rag
    provider: us-managed-inference
    tier: T3
    reason: "T3 (SecNumCloud / EUCS High) requires 100% EU jurisdiction ; US-managed inference is CLOUD Act exposure"
    since: "0.5.0"
    alternative: "Mistral on Scaleway (SecNumCloud) or self-hosted vLLM on EU infrastructure"
    rule_id: J8-RULE-006
  # ── B.6.10 (b6-10-janus-rule) — event-driven-eu Kafka-SaaS refusals ──
  # <!-- Audit: B.6.10 (b6-10-janus-rule) -->
  # Sibling of the J.8.c LLM-provider entries above. Enforces the schema flag
  # event_specifics.eu_sovereignty.no_kafka_saas_us (event-driven-eu/1.0.0.yaml):
  # Confluent Cloud (US-managed Kafka SaaS) is refused as the event broker
  # regardless of tier; at T3 any US-managed Kafka SaaS is refused. Sanctioned
  # brokers = self-hosted NATS JetStream (default) / Redpanda (EU-deployable).
  - archetype: event-driven-eu
    provider: confluent-cloud
    tier: any            # fires regardless of declared tier (never a valid default)
    reason: "Confluent Cloud = US-managed Kafka SaaS ; Schrems II / CLOUD Act incompatible with the event-driven-eu EU-sovereign posture (schema event_specifics.eu_sovereignty.no_kafka_saas_us)"
    since: "0.6.0"
    alternative: "self-hosted NATS JetStream (the archetype default) or Redpanda (Kafka-API-compatible, self-hostable, EU-deployable) on EU infrastructure"
    rule_id: J8-RULE-007
  - archetype: event-driven-eu
    provider: us-managed-kafka
    tier: T3
    reason: "T3 (SecNumCloud / EUCS High) requires 100% EU jurisdiction ; any US-managed Kafka SaaS (Confluent Cloud / AWS MSK / Azure Event Hubs) is CLOUD Act exposure"
    since: "0.6.0"
    alternative: "self-hosted NATS JetStream or Redpanda on EU infrastructure (SecNumCloud / OVHcloud / Scaleway)"
    rule_id: J8-RULE-008

