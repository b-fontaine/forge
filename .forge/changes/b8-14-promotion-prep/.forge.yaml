IVE OVERLAY — it contains NO Kong (find -iname "*kong*" in 2.0.0/ = 0). Kong lives ONLY in the frozen 1.0.0 base (docker-compose.dev.yml fsm-kong:90-120, infra/kong/kong.yml.example, .env FSM_KONG_ADMIN_PORT, scaffold-plan.yaml:156-157). 1.0.0 is byte-frozen (b8-2). So the removal cannot delete-from-2.0.0 (nothing there) nor edit frozen-1.0.0 ⇒ it is captured as a STAGED removal-manifest (the exact base paths the 2.0.0 scaffold composition will exclude at flip), executed by the follow-up. (6) Pure prepare brick — applies NO constitution edit, NO 2.0.0.yaml flip, NO Kong removal, NO standard/schema mutation ; constitution_version stays 1.1.0 ; frozen 1.0.0 + 2.0.0 overlay byte-unchanged ; ships staged artifacts (drafted amendment, removal manifest, flip runbook, deprecation draft) + b8-14.test.sh whose KEY assertions are NEGATIVE guards proving the held state (so the flip cannot leak in without the follow-up).
