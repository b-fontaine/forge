# Forge Standard — Transport contracts
# Audit: T.4 (t4-adr-ratification, 2026-05-04) ; T.5 (t5-connect-codegen, 2026-05-05)
# Ratifies: ADR-003 + ADR-009 from docs/ARCHITECTURE-TARGET.md
# Structural exception per Article XII : not subject to 12-month review.
#
# v1.1.0 (t5-connect-codegen 2026-05-05) : additive — no breaking change.
#   - Added codegen.connect_layout_version: 1 (FR-T5-CC-021).
#   - Added codegen.versions: map with concrete pins (FR-T5-CC-022, ADR-T5-002).
#   - Refreshed codegen.tools list per Context7 investigation 2026-05-05 :
#     replaced retired `protoc-gen-connect-es` (Connect v2 migration) with
#     `protoc-gen-es` ; replaced abandoned `protoc-gen-connect-dart-community`
#     with the official `connectrpc/connect-dart` plugin ; added the
#     `connectrpc` Rust crate family (Anthropic OSS) per ADR-T5-001.

version: "1.2.0"
last_reviewed: 2026-05-04
expires_at: never
exception_constitutional: true
linter_rule: null
enforcement:
  ci_blocking: false
  pre_commit_hook: false
forbidden: []
rationale: |
  Transport contracts (proto + Connect) are structural to Forge's spec→code
  pipeline. ADR-009 (buf single source of truth + Connect codegen) and
  ADR-003 (Connect over REST-bridge) jointly establish this. Subject only
  to Constitution amendment (Article XII process).

protocol: connect-rpc
fallback: grpc-web
http_versions: [http/1.1, http/2, http/3-experimental]

server_runtime:
  language: rust
  versions:
    tonic: ^0.14
    axum: ^0.8

codegen:
  source_of_truth: protobuf
  connect_layout_version: 1
  tools:
    - buf
    - protoc-gen-connect-go
    - protoc-gen-es
    - connectrpc-dart
    - connectrpc
    - buffa
    - buffa-types
    - connectrpc-build
    - neoeinstein-tonic
    - neoeinstein-prost
  versions:
    # WAIVER 2026-05-05 (preserved) : connectrpc / connectrpc-build pinned
    # `=0.3.3` at 13-day crate age (< 30-day age criterion of ADR-T5-002 #1
    # in design.md of t5-connect-codegen). Justification :
    #   (1) ConnectRPC conformance suite (6 558 tests) passing satisfies the
    #       regression-filter intent of the 30-day rule.
    #   (2) Anthropic OSS pedigree (`anthropics/connect-rust`).
    #   (3) Exact `=0.3.3` pin keeps upgrades manual.
    # Pre-1.0 — monitor upstream releases ; B.8 (T6) re-evaluates.
    #
    # Amend 2026-05-16 (t5-cargo-pin-refresh, T5.1.E / ADR-T5CPR-001 / ADR-T5CPR-003) :
    # buffa / buffa-types were pinned `=0.3.3` by t5-connect-codegen but those
    # versions were never published on crates.io (series 0.3.x stops at 0.3.0).
    # connectrpc 0.3.3 declares `buffa = "^0.3"` — `=0.3.0` is the unique
    # resolvable exact pin satisfying that constraint. Correction is NOT a
    # WAIVER ; it is an error-of-fact fix. RED witness : task validate 2026-05-16
    # (cli-trust-harness archetypes-smoke FORGE_E2E_TOOLCHAINS=1).
    buf: "1.68.2"
    protoc-gen-connect-go: "1.19.2"
    protoc-gen-es: ">=2.2.0"
    "@connectrpc/connect": "^2.0.0"
    "@connectrpc/connect-web": "^2.0.0"
    connectrpc-dart: ">=1.0.0"
    connectrpc: "=0.3.3"        # WAIVER (see comment above)
    buffa: "=0.3.0"              # CORRECTION (see Amend 2026-05-16 above)
    buffa-types: "=0.3.0"        # CORRECTION
    connectrpc-build: "=0.3.3"   # WAIVER (build-dep)
  derived_outputs: [openapi-3.1, asyncapi-3.1]

breaking_change_check: "buf breaking --against '.git#branch=main'"
