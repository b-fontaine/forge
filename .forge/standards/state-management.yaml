# Forge Standard — Flutter state management
# Audit: T.4 (t4-adr-ratification, 2026-05-04)
# Ratifies: ADR-006 from docs/ARCHITECTURE-TARGET.md
# Structural exception per Article XII : not subject to 12-month review.

version: "1.1.0"
# Version history:
#   1.0.0 (T.4, 2026-05-04) — initial ratification; enforcement deferred (ci_blocking: false)
#   1.1.0 (b8-11-nsma-linter, 2026-06-03) — ci_blocking activated; enforcement now CI-blocking
last_reviewed: 2026-06-03
expires_at: never
exception_constitutional: true
linter_rule: no-state-management-alternatives
enforcement:
  ci_blocking: true   # activated B.8.11 (b8-11-nsma-linter, 2026-06-03) — formerly warn-only
  pre_commit_hook: false  # runner is G.2 territory; flip to true when dep-linting hook ships
  activated_by: "b8-11-nsma-linter (B.8.11, 2026-06-03)"
forbidden:
  - flutter_riverpod
  - riverpod
  - provider
  - get
  - getx
  - mobx
  - flutter_mobx
  - states_rebuilder
rationale: |
  flutter_bloc imposes an event-driven discipline (Event → Bloc → State) that
  natively aligns with Forge's SDD principles (deterministic specs → typed
  events). Per ADR-006, alternatives are not a quality judgment but a
  deliberate single-cadre choice that signals premium positioning : one
  canonical pattern, no menu of options. Structural exception — Article XII
  is the only path to amend.

flutter:
  standard: flutter_bloc
  version_pinned: ^9.0.0
  companions:
    - bloc_test
    - hydrated_bloc
    - replay_bloc
