# Forge Archetype — ai-native-rag scaffold plan (1.0.0, CANDIDATE)
# <!-- Audit: B.7.2 (b7-2-scaffolder, Phase 1) — ai-native-rag/1.0.0 scaffold plan -->
#
# Drives `overlay.sh --plan` (the same renderer the flagship uses). Schema-shaped
# like full-stack-monorepo/scaffold-plan-2.0.0.yaml: archetype | version |
# official_scaffolders | templates | post_steps. Placeholders substituted by
# overlay.sh: <project-name>, <reverse-domain>, <root-module>.
#
# NOTE (candidate / scaffoldable:false): the schema stays `candidate`, so the CLI
# refuses `forge init --archetype ai-native-rag` (exit 3). This plan is rendered
# directly via overlay.sh by the b7-2 harness (L2 render-clean) — NOT through the
# CLI scaffoldable gate. Promotion to stable rides b7-6-harness (ADR-B7-2-001).
#
# Phase 1 (template tree foundation) ships the STRUCTURAL scaffolding only:
# root files, per-layer CLAUDE.md + READMEs, the backend workspace manifest with
# the verify-then-pin ledger, infra pgvector init, and the shared/protos seed.
# The Rust module source + per-crate manifests + the Qwik shell land in
# Phases 2-3 and are appended to this plan then.
#
# `source:` paths are relative to the archetype dir
# (.forge/templates/archetypes/ai-native-rag/), mirroring the flagship plan's
# `2.0.0/...` convention.

archetype: ai-native-rag
version: 1.0.0

# Official scaffolders run by init.sh BEFORE the overlay. None in Phase 1: the
# backend Cargo workspace + Qwik app are scaffolded by Phase 2/3 entries (and
# wired into the real wrapper in Phase 4). overlay.sh ignores this list.
official_scaffolders: []

