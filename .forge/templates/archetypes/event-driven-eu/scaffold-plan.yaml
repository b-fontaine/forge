# <!-- Audit: B.6.2 (b6-2-scaffolder) — event-driven-eu/1.0.0 scaffold plan -->
#
# Drives overlay.sh --plan (the same renderer the flagship + ai-native-rag use).
# Placeholders substituted by overlay.sh: <project-name>, <reverse-domain>,
# <root-module>. `source:` paths are relative to the archetype dir
# (.forge/templates/archetypes/event-driven-eu/). Auto-generated to match the
# 1.0.0/ tree exactly (no orphan/dangling entries — b6-2.test.sh T-002).
#
# CANDIDATE / scaffoldable:false: the CLI refuses `forge init --archetype
# event-driven-eu` (exit 3). This plan is rendered directly via overlay.sh (the
# b6-2 L2 harness + the gated wrapper). Promotion to stable rides B.6.7.

archetype: event-driven-eu
version: 1.0.0

# Official scaffolders run by init.sh BEFORE the overlay. None: the backend
# ships full Cargo.toml manifests (no `cargo new`), so overlay alone produces a
# complete tree. overlay.sh ignores this list.
official_scaffolders: []

