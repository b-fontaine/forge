# Forge Archetype — full-stack-monorepo scaffold plan (2.0.0, Kong-less)
# <!-- Audit: B.8.14 (b8-14-promotion-flip, C2) — Kong-less 2.0.0 fresh-init plan -->
#
# Generated from scaffold-plan.yaml (1.0.0) by dropping the Kong copy-op and
# re-pointing the Kong-bearing root/infra templates to their 2.0.0/ Kong-less
# variants, then appending the Envoy Gateway manifests (Kubernetes Gateway API)
# per Constitution v2.0.0 §VIII.1. Consumed by overlay.sh --plan (b8-14-flip).
# The frozen 1.0.0 plan + base are byte-untouched; this is an additive sibling.
#
# Schema is identical to scaffold-plan.yaml (validated by scaffolder.test.sh +
# b8-14-flip.test.sh): archetype | version | official_scaffolders | templates |
# post_steps. Placeholders: <project-name> <reverse-domain> <root-module>.
#
# NOTE (scope): B.8.14 flips the constitutional API gateway (Kong -> Envoy).
# Postgres-17/pgvector (B.8.5), Zitadel (B.8.7) and the Qwik web-public surface
# (B.8.9) ship as additive overlays/fragments and via forge-migrate-flagship;
# wiring them into fresh-init is out of this brick's scope.
archetype: full-stack-monorepo
version: 2.0.0
official_scaffolders:
- cmd: flutter create frontend --org <reverse-domain> --platforms android,ios,web --project-name <project_name_snake>_frontend
  required: true
- cmd: mkdir -p backend/crates
  required: true
- cmd: cd backend && cargo new --lib crates/domain --vcs none
  required: true
- cmd: cd backend && cargo new --lib crates/application --vcs none
  required: true
- cmd: cd backend && cargo new --lib crates/grpc-api --vcs none
  required: true
- cmd: cd backend && cargo new --lib crates/infrastructure --vcs none
  required: true
- cmd: cd backend && cargo new bin-server --vcs none
  required: true
