# <!-- Audit: B.6.2 (b6-2-scaffolder) — minimal local-dev NATS JetStream config -->
#
# LOCAL DEV single-node JetStream. The PRODUCTION clustered config (3-node RAFT,
# persistence tuning, consumer groups) is infra/nats-jetstream.md (B.6.3) + the
# Helm chart (B.6.6) — NOT this file. Loaded by docker-compose.dev.yml via
# `nats -c /etc/nats/jetstream.conf`.

server_name: ede-nats-dev

# Enable JetStream with modest local limits (file-backed, persisted to the volume
# mounted at /data by docker-compose.dev.yml).
jetstream {
  store_dir: "/data"
  max_memory_store: 268435456   # 256 MB
  max_file_store: 2147483648    # 2 GB
}

# Monitoring endpoint (used by the compose healthcheck: GET /healthz).
http_port: 8222
