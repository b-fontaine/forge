# <!-- Audit: B.6.2 (b6-2-scaffolder) — event-driven-eu backend workspace manifest -->
#
# Cargo workspace root for the event-driven-eu backend. Every external crate pin
# lives HERE (the rendered Cargo.toml), never in a global/*.md standard
# (ADR-B6-1-003 / b6-3 will keep standards pin-free). Member crates inherit deps
# via `<dep>.workspace = true`.
#
# Members (the event-driven building blocks):
#   events      — NATS JetStream event backbone: versioned/idempotent envelope,
#                 EventPublisher port + JetStream impl (Nats-Msg-Id dedup), inbox.
#   eventstore  — append-only Postgres event store (sqlx) + read-model projections.
#   saga        — Temporal ACTIVITY-ONLY saga layer: activity marker traits + a
#                 deterministic compensation coordinator. The pre-alpha Temporal
#                 SDK is behind the OFF-by-default `temporal-sdk` feature.
#   bin-server  — axum entrypoint + DI wiring (no business logic).
#
# Connect-RPC / tonic / prost are consumed BY REFERENCE via shared/protos + buf
# (transport.yaml, derived_outputs incl. asyncapi-3.1); the gRPC/Connect stubs are
# generated by `buf generate` at the adopter/codegen step, not pinned here.
[workspace]
resolver = "2"
members = ["events", "eventstore", "saga", "bin-server"]

[workspace.dependencies]
# ── Async / runtime ──
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"
futures = "0.3"

# ── Error handling (Article VII.3: thiserror in libs, anyhow in the binary) ──
thiserror = "1"
anyhow = "1"

# ── Observability (Article IX.4: tracing) ──
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# ── HTTP (axum per transport.yaml server_runtime: axum ^0.8) ──
axum = "0.8"
tower = "0.5"
tower-http = { version = "0.6", features = ["trace"] }
http = "1"

# ── Serialization ──
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# ── Net-new pins (verify-then-pin LIVE — .forge/research/b6-2-verify-then-pin.md) ──
# NATS JetStream client (events). Idempotent publish via the Nats-Msg-Id header.
async-nats = "0.49.1"
# Postgres event store (eventstore). Runtime queries only (no query! macro / no
# DATABASE_URL needed to build). sqlx 0.9 split runtime-tokio-rustls into
# runtime-tokio + tls-rustls-ring.
sqlx = { version = "0.9", features = ["runtime-tokio", "tls-rustls-ring", "postgres", "chrono", "uuid", "json"] }
# Temporal native Rust SDK (saga) — Public Preview / pre-alpha (infra/temporal.md).
# Pinned but OPTIONAL; the saga crate keeps it OFF by default behind `temporal-sdk`
# so default builds don't compile the unstable workflow API (activity-only bias).
temporalio-sdk = "0.5.0"
temporalio-client = "0.5.0"

# ── Internal member crates ──
events = { path = "events" }
eventstore = { path = "eventstore" }
saga = { path = "saga" }
