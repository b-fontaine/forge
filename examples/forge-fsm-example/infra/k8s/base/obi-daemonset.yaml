# <!-- Audit: T.5 (t5-otel-stack, FR-OTEL-001..010) -->
# OpenTelemetry eBPF (OBI / Beyla) DaemonSet — auto-instruments host processes
# without app code changes. Standard: `.forge/standards/observability.yaml` v1.1.0.
# ADR base: ARCHITECTURE-TARGET ADR-008 ; security posture: ADR-OTEL-004 in
# `.forge/changes/t5-otel-stack/design.md` (unprivileged with capabilities).
#
# Aegis audit required for production rollout (deployment_constraints.aegis_audit_required_for_prod: true).
# Kernel ≥ 5.8 mandatory ; gated by the `forge.dev/kernel-min-58: "true"` node label.
# Image pin per `observability.yaml::versions.beyla` (1.1.0+).
#
# Multi-doc : ServiceAccount + ClusterRole + ClusterRoleBinding + DaemonSet.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: forge-fsm-example-obi
  labels:
    app.kubernetes.io/name: forge-fsm-example
    app.kubernetes.io/component: obi
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: forge-fsm-example-obi
  labels:
    app.kubernetes.io/name: forge-fsm-example
    app.kubernetes.io/component: obi
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: forge-fsm-example-obi
  labels:
    app.kubernetes.io/name: forge-fsm-example
    app.kubernetes.io/component: obi
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: forge-fsm-example-obi
subjects:
  - kind: ServiceAccount
    name: forge-fsm-example-obi
    namespace: default
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: forge-fsm-example-obi
  labels:
    app.kubernetes.io/name: forge-fsm-example
    app.kubernetes.io/component: obi
  annotations:
    forge.dev/aegis-audit: "required"
    forge.dev/standard: "observability.yaml@2.1.0"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: forge-fsm-example
      app.kubernetes.io/component: obi
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forge-fsm-example
        app.kubernetes.io/component: obi
    spec:
      serviceAccountName: forge-fsm-example-obi
      hostPID: true
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/os: linux
        forge.dev/kernel-min-58: "true"
      tolerations:
        - effect: NoSchedule
          operator: Exists
        - effect: NoExecute
          operator: Exists
      # ── B.8.8 / b8-obi-refresh (2026-05-29) — Beyla major bump ──
      # Refreshed from grafana/beyla:2.0.1 (T.5 / t5-otel-stack 2026-05-09)
      # to grafana/beyla:3.15.0 (verify-then-pin discipline, lesson T5.3.2).
      # Aegis re-audited caps + RBAC + kernel floor at ADR-B8-OBI-002/003/004.
      # ClusterRole gains `services` resource per Beyla 3.x docs (ADR-B8-OBI-003).
      containers:
        - name: obi
          image: grafana/beyla:3.15.0
          imagePullPolicy: IfNotPresent
          terminationMessagePolicy: FallbackToLogsOnError
          securityContext:
            runAsUser: 0
            readOnlyRootFilesystem: true
            capabilities:
              add:
                - BPF
                - SYS_PTRACE
                - NET_RAW
                - CHECKPOINT_RESTORE
                - DAC_READ_SEARCH
                - PERFMON
                - NET_ADMIN
                - SYS_ADMIN
              drop:
                - ALL
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://forge-fsm-example-otel-collector:4318"
            - name: BEYLA_KUBE_METADATA_ENABLE
              value: "autodetect"
            - name: KUBE_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: var-run-beyla
              mountPath: /var/run/beyla
            - name: cgroup
              mountPath: /sys/fs/cgroup
              readOnly: true
      volumes:
        - name: var-run-beyla
          emptyDir: {}
        - name: cgroup
          hostPath:
            path: /sys/fs/cgroup
            type: Directory
