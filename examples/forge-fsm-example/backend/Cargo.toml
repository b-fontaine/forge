# <!-- Audit: B.1.2 (part of b1-scaffolder, backend workspace manifest) -->
# <!-- Overlay: workspace manifest, not generated by cargo new. See design ADR-002. -->
#
# This file is rendered BEFORE the cargo new invocations so that each
# `cargo new --lib crates/<name> --vcs none` detects the parent workspace
# and writes a workspace-aware Cargo.toml inside the crate directory.

[workspace]
resolver = "2"
members = [
  "crates/domain",
  "crates/application",
  "crates/grpc-api",
  "crates/infrastructure",
  "bin-server",
]

# Shared workspace dependencies — pin canonical versions so every crate
# inherits them with `dep.workspace = true` instead of re-declaring.
[workspace.dependencies]
# ── Async / runtime ──
tokio = { version = "1", features = ["full"] }
futures = "0.3"
async-trait = "0.1"

# ── Error handling (rust/error-handling standard) ──
thiserror = "1"
anyhow = "1"

# ── Observability (b1-delivery will wire this) ──
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# ── OpenTelemetry SDK family (t5-otel-app — Phase B SDK instrumentation)
# Pinned per ADR-T5-OTA-001 (Context7 /open-telemetry/opentelemetry-rust 2026-05-10).
# ADR-T5-OTA-002 deviates from rust/opentelemetry.md §Setup snippet (which uses
# with_tonic / gRPC) : both layers ship HTTP/protobuf for symmetry with the
# Flutter exporter and the Phase A collector :4318 receiver.
opentelemetry = "0.31"                                                           # Audit: T.5 (t5-otel-app)
opentelemetry_sdk = { version = "0.31", features = ["rt-tokio"] }                # Audit: T.5 (t5-otel-app)
opentelemetry-otlp = { version = "0.31", features = ["http-proto", "reqwest-client"] }  # Audit: T.5 (t5-otel-app)
opentelemetry-semantic-conventions = "0.31"                                      # Audit: T.5 (t5-otel-app)
tracing-opentelemetry = "0.32"                                                   # Audit: T.5 (t5-otel-app)
tower-http = { version = "0.6", features = ["trace"] }                           # Audit: T.5 (t5-otel-app)
http = "1"                                                                       # Audit: T.5 (t5-otel-app)
hostname = "0.4"                                                                 # Audit: T.5 (t5-otel-app)
axum = "0.7"                                                                     # Audit: T.5 (t5-otel-app)

# ── gRPC (rust/grpc standard) ──
tonic = "0.12"
prost = "0.13"
tonic-build = "0.12"

# ── Database (infrastructure layer) ──
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "macros"] }

# ── Testing ──
proptest = "1"
mockall = "0.13"
tokio-test = "0.4"

# ── Serialization ──
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Profiles : let each crate pick its own ; workspace-level overrides are
# discouraged (they leak across layers).
