# <!-- Audit: B.1.9 (b1-delivery, FR-IN-003) -->
# Reference per-layer frontend CI workflow. Standard:
# .forge/standards/infra/ci-workflows.md
#
# Triggers on `pull_request` and `push`. Uses dorny/paths-filter@v3
# scoped to frontend/** + shared/protos/**. Steps in order: pub get
# → dart format --set-exit-if-changed → flutter analyze --fatal-* →
# flutter test → verify.sh → constitution-linter.sh.
# Flutter SDK pinned via .flutter-version at the project root.

name: forge-frontend

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: forge-frontend-forge-fsm-example-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  filter:
    name: Detect frontend changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - 'shared/protos/**'

  build:
    name: Frontend build + gates
    needs: filter
    if: needs.filter.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter (pinned via .flutter-version)
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .flutter-version
          cache: true

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('frontend/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: flutter pub get
        run: flutter pub get

      - name: dart format --set-exit-if-changed
        run: dart format --set-exit-if-changed .

      - name: flutter analyze --fatal-infos --fatal-warnings
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: flutter test --coverage
        run: flutter test --coverage

      - name: Upload coverage (main only, MAY)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/lcov.info
          if-no-files-found: warn

      - name: verify.sh
        working-directory: ${{ github.workspace }}
        run: bash .forge/scripts/verify.sh

      - name: constitution-linter.sh
        working-directory: ${{ github.workspace }}
        run: bash .forge/scripts/constitution-linter.sh
