# <!-- Audit: B.1.4 (part of b1-scaffolder, buf module config) -->
#
# Buf module configuration for <project-name>'s proto contracts.
# Conforms to .forge/standards/global/proto-contracts.md.
# Validated on every PR by `buf lint` and `buf breaking`
# (see Taskfile.yml `task proto:check`).

version: v2

modules:
  - path: .

lint:
  use:
    - STANDARD
  except:
    # PACKAGE_DIRECTORY_MATCH — disabled because the Forge monorepo
    # standard (proto-contracts.md) prescribes version-first directory
    # layout `v1/<service>/` with package `<service>.v1`, which buf
    # STANDARD does not match (it expects `<service>/v1/`). The two
    # conventions are irreconcilable without a standard amendment ;
    # tracked as a Forge carry-over (future b1-x change). Project
    # teams SHOULD keep this exception in place or, if they switch to
    # buf-STANDARD layout, remove it and move protos accordingly.
    - PACKAGE_DIRECTORY_MATCH
  enum_zero_value_suffix: _UNSPECIFIED
  rpc_allow_same_request_response: false
  rpc_allow_google_protobuf_empty_requests: false
  rpc_allow_google_protobuf_empty_responses: false
  service_suffix: Service

breaking:
  use:
    - FILE
