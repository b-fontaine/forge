# <!-- Audit: B.7.2 (b7-2-scaffolder, Phase 1) — ai-native-rag/1.0.0 Taskfile -->
# Structural precedent: full-stack-monorepo/2.0.0/Taskfile.yml.tmpl
# NOTE: {{.VAR}} below is go-task (Go-template) syntax, NOT a Forge scaffold
# placeholder. Forge placeholders use the <angle-bracket> form (forge-rag-example).

version: '3'

vars:
  PROJECT_NAME: forge-rag-example
  COMPOSE_DEV: docker-compose.dev.yml
  PROTO_DIR: shared/protos
  WEB_PUBLIC_DIR: frontend/web-public

# ── Dev ──────────────────────────────────────────────────────────────────────

tasks:
  dev:
    desc: "Start local dev stack (compose)"
    cmds:
      - docker-compose -f {{.COMPOSE_DEV}} up -d

  dev:up:
    desc: "Start local dev stack (compose) — alias of dev"
    cmds:
      - docker-compose -f {{.COMPOSE_DEV}} up -d

  dev:down:
    desc: "Stop local dev stack"
    cmds:
      - docker-compose -f {{.COMPOSE_DEV}} down

# ── Observability ────────────────────────────────────────────────────────────

  observe:
    desc: "Open the local SigNoz UI (assumes `task dev` is up)"
    cmds:
      - |
        if command -v open >/dev/null 2>&1; then
          open http://localhost:3301
        elif command -v xdg-open >/dev/null 2>&1; then
          xdg-open http://localhost:3301
        else
          echo "Neither 'open' (macOS) nor 'xdg-open' (Linux) found. Browse to http://localhost:3301 manually."
        fi
    silent: true

# ── Tests ────────────────────────────────────────────────────────────────────

  test:
    desc: "Run all tests"
    deps:
      - test:backend
      - test:frontend
      - test:infra

  test:backend:
    desc: "Run Rust backend tests (all features)"
    cmds:
      - cd backend && cargo test --all-features

  test:frontend:
    desc: "Run Qwik web-public tests"
    cmds:
      - cd {{.WEB_PUBLIC_DIR}} && npm test --if-present

  test:infra:
    desc: "Validate compose/k8s configs"
    cmds:
      - 'echo "infra tests: delegated to b1-delivery workflows"'

# ── Lint ─────────────────────────────────────────────────────────────────────

  lint:
    desc: "Run all linters (backend, frontend, proto)"
    deps:
      - lint:backend
      - lint:frontend
      - lint:proto

  lint:backend:
    desc: "Run Rust clippy and fmt check"
    cmds:
      - cd backend && cargo clippy --all-targets -- -D warnings && cargo fmt --check

  lint:frontend:
    desc: "Run Qwik lint (if configured)"
    cmds:
      - cd {{.WEB_PUBLIC_DIR}} && npm run lint --if-present

  lint:proto:
    desc: "Lint and format-check proto files with buf"
    cmds:
      - cd {{.PROTO_DIR}} && buf lint && buf format --diff --exit-code

# ── Proto ────────────────────────────────────────────────────────────────────

  proto:
    desc: "Regenerate proto stubs (Rust via tonic-build, TS via bufbuild/es)"
    cmds:
      - cd {{.PROTO_DIR}} && buf generate

  proto:check:
    desc: "Lint and breaking-change check for all protos"
    cmds:
      - cd {{.PROTO_DIR}} && buf lint && buf breaking --against '.git#branch=main'

# ── Release ──────────────────────────────────────────────────────────────────

  release:
    desc: "Release train stub — see docs/VERSIONING.md"
    silent: true
    cmds:
      - echo "Release train workflow — see docs/VERSIONING.md (Forge framework)"
