# <!-- Audit: B.7.2 (b7-2-scaffolder, Phase 2) ‚Äî ai-native-rag backend workspace manifest -->
# Structural precedent: full-stack-monorepo backend/Cargo.toml.tmpl
#
# Cargo workspace root for forge-rag-example's backend. Every external crate pin
# lives HERE (the rendered Cargo.toml), never in a global/*.md standard
# (FR-B7-2-041, ADR-B7-2-003 ‚Äî b7-3 T-007 no-inline-pin guard stays GREEN).
# Member crates inherit deps via `<dep>.workspace = true`.
#
# Members (the three net-new ai-native-rag layers + the DI entrypoint):
#   rag         ‚Äî chunking ¬∑ embeddings (Embedder trait) ¬∑ hybrid retrieval (RRF) ¬∑
#                 re-rank ¬∑ pgvector HNSW ¬∑ Temporal activity-only worker.
#   llm_gateway ‚Äî thin axum proxy: OpenAI-compat upstream, prompt-audit (IX.6),
#                 token budget + kill-switch + non-AI fallback (XI.5), PII (XI.6).
#   mcp         ‚Äî rmcp tool_router server (search stub) + dual transport.
#   bin-server  ‚Äî DI wiring + axum entrypoint; substrate consumed by reference.
#
# The Connect-RPC / Temporal / Zitadel / OTel substrate is consumed from the
# full-stack 2.0.0 stack BY REFERENCE (FR-B7-2-011), not re-declared here.

[workspace]
resolver = "2"
members = [
    "rag",
    "llm_gateway",
    "mcp",
    "bin-server",
]

[workspace.dependencies]
# ‚îÄ‚îÄ Async / runtime ‚îÄ‚îÄ
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"
futures = "0.3"
# Streaming RAG answer path (B.7.10): wrappers::ReceiverStream adapts a bounded
# tokio::sync::mpsc Receiver into a Stream<Item = QueryChunk> for the Connect
# server-streaming handler. Verify-then-pin LIVE 2026-06-23 (.forge/research/
# b7-10-verify-then-pin.md); consumed by llm_gateway only. Pin lives HERE only
# (ADR-B7-10-004 / NFR-B7-10-005), never in a standard or a frontend file.
tokio-stream = "0.1.18"

# ‚îÄ‚îÄ Error handling ‚îÄ‚îÄ
thiserror = "1"
anyhow = "1"

# ‚îÄ‚îÄ Observability (IX.6 prompt-audit spans) ‚îÄ‚îÄ
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# ‚îÄ‚îÄ HTTP / transport (axum substrate) ‚îÄ‚îÄ
axum = "0.8"
tower = "0.5"
tower-http = { version = "0.6", features = ["trace"] }
http = "1"

# ‚îÄ‚îÄ Database (pgvector access via sqlx) ‚îÄ‚îÄ
# sqlx 0.9 (NOT 0.8) is REQUIRED by pgvector 0.4.2 ‚Äî pinning 0.8 puts two
# sqlx-core versions in the graph and `pgvector::Vector: sqlx::Type` fails to
# resolve (verify-then-pin LIVE, 2026-06-21). 0.9 split the old
# `runtime-tokio-rustls` umbrella into `runtime-tokio` + `tls-rustls-ring`.
sqlx = { version = "0.9", features = ["runtime-tokio", "tls-rustls-ring", "postgres", "macros"] }

# ‚îÄ‚îÄ Serialization ‚îÄ‚îÄ
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# JSON Schema for MCP tool params ‚Äî pinned to the version rmcp 1.7.0 uses so the
# derived `JsonSchema` satisfies rmcp's tool-router bound.
schemars = "1"

# ‚îÄ‚îÄ Testing ‚îÄ‚îÄ
tokio-test = "0.4"

# ‚îÄ‚îÄ Net-new pins (verify-then-pin LIVE ‚Äî .forge/research/b7-2-verify-then-pin.md) ‚îÄ‚îÄ
# MCP servers (mcp) ‚Äî official Rust SDK. `auth` = OAuth 2.0 (‚Üí Zitadel/Envoy).
# Transport features (transport-io / transport-streamable-http-server + ...) are
# selected by the mcp crate's own `mcp-stdio` / `mcp-http` features (ADR-B7-2-005).
rmcp = { version = "1.7.0", features = ["server", "macros", "schemars", "auth"] }
# RAG pgvector access layer (rag) ‚Äî HNSW vector_cosine_ops via sqlx.
pgvector = { version = "0.4.2", features = ["sqlx"] }
# LLM gateway upstream client + MistralEmbedder. async-openai 0.41.x is per-API
# feature-gated; `embedding` turns on the embeddings client (pulls the `_api`
# Client surface). Default already enables `rustls`.
async-openai = { version = "0.41.1", features = ["embedding"] }
# LocalEmbedder in-process ONNX embeddings (rag) ‚Äî XI.5 fallback / T3 zero-egress.
# Heavy native dep (pulls ONNX Runtime via `ort`); the rag crate keeps it OFF by
# default behind the `local-embeddings` feature so default builds stay hermetic.
fastembed = "5.17.2"
