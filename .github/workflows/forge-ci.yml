# <!-- Audit: G.1 (g1-forge-ci) -->
# Forge's own CI workflow. Standard:
# .forge/standards/global/forge-self-ci.md
#
# Runs the four shell test harnesses, the two deterministic gates,
# the CLI Vitest suite, and shellcheck on every PR + push to main.
# Aggregates the four worker jobs into a single required status
# `forge-ci / summary` for branch protection.
#
# Asymmetric concurrency (ADR-002): PR runs cancel in-progress to
# save CPU, but push:main runs do NOT cancel — partial main results
# matter, the next push will retrigger naturally.

name: forge-ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Single source of truth for cancel semantics: PRs cancel, main doesn't.
concurrency:
  group: forge-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Minimum permission set (Aegis hygiene, NFR-CI-005). No write access.
permissions:
  contents: read

jobs:
  # ─── harness ── 4 shell test harnesses (L1+L2 only) ────────────
  harness:
    name: Test harnesses (foundations + scaffolder + workflow + delivery)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PyYAML
        run: pip install pyyaml
      - name: foundations.test.sh
        run: bash .forge/scripts/tests/foundations.test.sh
      - name: scaffolder.test.sh (L1+L2)
        run: bash .forge/scripts/tests/scaffolder.test.sh --level 1,2
      - name: workflow.test.sh (L1+L2)
        run: bash .forge/scripts/tests/workflow.test.sh --level 1,2
      - name: delivery.test.sh
        run: bash .forge/scripts/tests/delivery.test.sh

  # ─── gates ── verify.sh + constitution-linter.sh ───────────────
  gates:
    name: Forge gates (verify + constitution-linter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PyYAML
        run: pip install pyyaml
      - name: verify.sh
        run: bash .forge/scripts/verify.sh
      - name: constitution-linter.sh
        run: bash .forge/scripts/constitution-linter.sh

  # ─── cli ── Vitest + lint + bundle ─────────────────────────────
  cli:
    name: CLI (npm test + bundle)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: cli/.nvmrc
          cache: npm
          cache-dependency-path: cli/package-lock.json
      - name: npm ci
        run: npm ci
      - name: npm run lint
        run: npm run lint
      - name: npm test
        run: npm test
      - name: npm run bundle
        run: npm run bundle

  # ─── lint ── shellcheck on Forge shell scripts ─────────────────
  lint:
    name: Shell lint (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck on .forge/scripts
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning
          scandir: ./.forge/scripts
      - name: shellcheck on bin
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning
          scandir: ./bin

  # ─── summary ── aggregator → single required status ───────────
  summary:
    name: Summary (required status)
    runs-on: ubuntu-latest
    needs: [harness, gates, cli, lint]
    if: always()
    steps:
      - name: Aggregate job results
        env:
          HARNESS_RESULT: ${{ needs.harness.result }}
          GATES_RESULT: ${{ needs.gates.result }}
          CLI_RESULT: ${{ needs.cli.result }}
          LINT_RESULT: ${{ needs.lint.result }}
        run: |
          set -eu
          declare -A results
          results[harness]="$HARNESS_RESULT"
          results[gates]="$GATES_RESULT"
          results[cli]="$CLI_RESULT"
          results[lint]="$LINT_RESULT"

          failed=()
          for job in harness gates cli lint; do
            if [ "${results[$job]}" != "success" ]; then
              failed+=("$job=${results[$job]}")
            fi
          done

          if [ "${#failed[@]}" -gt 0 ]; then
            echo "::error::forge-ci: ${failed[*]} FAILED"
            exit 1
          fi
          echo "::notice::forge-ci: 4/4 jobs PASS"
