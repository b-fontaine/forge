# <!-- Audit: G.1 (g1-forge-ci) -->
# Forge's own CI workflow. Standard:
# .forge/standards/global/forge-self-ci.md
#
# Runs the four shell test harnesses, the two deterministic gates,
# the CLI Vitest suite, and shellcheck on every PR + push to main.
# Aggregates the four worker jobs into a single required status
# `forge-ci / summary` for branch protection.
#
# Asymmetric concurrency (ADR-002): PR runs cancel in-progress to
# save CPU, but push:main runs do NOT cancel — partial main results
# matter, the next push will retrigger naturally.

name: forge-ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Single source of truth for cancel semantics: PRs cancel, main doesn't.
concurrency:
  group: forge-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Minimum permission set (Aegis hygiene, NFR-CI-005). No write access.
permissions:
  contents: read

jobs:
  # ─── harness ── 4 shell test harnesses (L1+L2 only) ────────────
  harness:
    name: Test harnesses (foundations + scaffolder + workflow + delivery)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PyYAML
        run: pip install pyyaml
      # b5.test.sh's Phase 2 tests exec node cli/dist/index.js — build it.
      - uses: actions/setup-node@v4
        with:
          node-version-file: cli/.nvmrc
          cache: npm
          cache-dependency-path: cli/package-lock.json
      - name: cli npm ci
        working-directory: cli
        run: npm ci
      - name: cli npm run bundle
        # Bundle (build + bundle-assets.mjs) — materialises `cli/assets/` mirror
        # (gitignored) required by `_test_t53_l1_011` (FR-T53-C-003).
        working-directory: cli
        run: npm run bundle
      - name: foundations.test.sh
        run: bash .forge/scripts/tests/foundations.test.sh
      - name: scaffolder.test.sh (L1+L2)
        run: bash .forge/scripts/tests/scaffolder.test.sh --level 1,2
      - name: workflow.test.sh (L1+L2)
        run: bash .forge/scripts/tests/workflow.test.sh --level 1,2
      - name: delivery.test.sh
        run: bash .forge/scripts/tests/delivery.test.sh
      - name: g1.test.sh
        run: bash .forge/scripts/tests/g1.test.sh
      - name: c1.test.sh
        run: bash .forge/scripts/tests/c1.test.sh
      - name: a7.test.sh
        run: bash .forge/scripts/tests/a7.test.sh
      - name: b5.test.sh
        run: bash .forge/scripts/tests/b5.test.sh
      - name: d5.test.sh
        run: bash .forge/scripts/tests/d5.test.sh
      - name: b4.test.sh
        run: bash .forge/scripts/tests/b4.test.sh --level 1,2
      - name: f1.test.sh
        run: bash .forge/scripts/tests/f1.test.sh --level 1,2
      - name: f2.test.sh
        run: bash .forge/scripts/tests/f2.test.sh --level 1,2
      - name: f4.test.sh
        run: bash .forge/scripts/tests/f4.test.sh --level 1,2
      - name: t4.test.sh
        run: bash .forge/scripts/tests/t4.test.sh --level 1,2
      - name: t5.test.sh
        # L2 fixtures (T-L2-001..007) deferred to a follow-up change ;
        # see .forge/changes/t5-connect-codegen/tasks.md "DEFERRED 2026-05-06"
        # note. L1 alone validates the post_cargo_new templates + the
        # v1.1.0 transport standard + the demo-005 archived shape —
        # sufficient for the T.5 archival gate.
        run: bash .forge/scripts/tests/t5.test.sh --level 1
      - name: j7.test.sh
        run: bash .forge/scripts/tests/j7.test.sh --level 1,2
      - name: t5-otel.test.sh
        run: bash .forge/scripts/tests/t5-otel.test.sh --level 1
      # T5.3 decommissioned t5-otel-dart-api-realign.test.sh (v1.1.0 Workiva
      # superseded by v2.0.0 Dartastic — see archive .forge-update-notes).
      - name: t5-otel-app.test.sh
        # T.5 Phase B SDK instrumentation ; L2 toolchain smoke gated separately.
        run: bash .forge/scripts/tests/t5-otel-app.test.sh --level 1
      - name: t5-otel-traceparent-e2e.test.sh
        # T.5 Phase C E2E traceparent harness ; live-run deferred to Phase D.
        run: bash .forge/scripts/tests/t5-otel-traceparent-e2e.test.sh --level 1
      - name: t5-otel-live-run.test.sh
        # T.5 Phase D OTel live-run ; docker leg opt-in via FORGE_LIVE_RUN_DOCKER=1.
        run: bash .forge/scripts/tests/t5-otel-live-run.test.sh --level 1
      - name: t5-2.test.sh
        run: bash .forge/scripts/tests/t5-2.test.sh --level 1  # T.5.2 ; L2 opt-in FORGE_T52_LIVE=1
      - name: t5-otel-dartastic.test.sh
        run: bash .forge/scripts/tests/t5-otel-dartastic.test.sh --level 1  # T.5.3 ; L2 opt-in FORGE_T53_LIVE=1
      - name: j8.test.sh
        run: bash .forge/scripts/tests/j8.test.sh --level 1,2
      - name: k3.test.sh
        run: bash .forge/scripts/tests/k3.test.sh --level 1,2
      - name: i2.test.sh
        run: bash .forge/scripts/tests/i2.test.sh --level 1
      - name: i6.test.sh
        run: bash .forge/scripts/tests/i6.test.sh --level 1,2
      - name: i3.test.sh
        run: bash .forge/scripts/tests/i3.test.sh --level 1,2
      - name: i5.test.sh
        # I.5 reusable compliance workflow harness. L2 opt-in via FORGE_I5_ACT=1 (ADR-I5-CW-003).
        run: bash .forge/scripts/tests/i5.test.sh --level 1
      - name: f3.test.sh
        # F.3 release script fix harness. L2 opt-in via FORGE_F3_LIVE=1 (ADR-F3-004).
        run: bash .forge/scripts/tests/f3.test.sh --level 1
      - name: t5-1.test.sh
        # T5.1 CLI Trust Harness. L2 opt-in via FORGE_T51_LIVE=1 / FORGE_T51_PACK=1.
        run: bash .forge/scripts/tests/t5-1.test.sh --level 1
      - name: t5-cargo.test.sh
        run: bash .forge/scripts/tests/t5-cargo.test.sh --level 1
      - name: t5-bin-server.test.sh
        run: bash .forge/scripts/tests/t5-bin-server.test.sh --level 1
      - name: t5-3-1.test.sh
        run: bash .forge/scripts/tests/t5-3-1.test.sh --level 1
      - name: t5-3-3.test.sh
        run: bash .forge/scripts/tests/t5-3-3.test.sh --level 1
      - name: b8-coroot.test.sh
        run: bash .forge/scripts/tests/b8-coroot.test.sh --level 1
      - name: b8-signoz.test.sh
        run: bash .forge/scripts/tests/b8-signoz.test.sh --level 1
      - name: b8-obi.test.sh
        run: bash .forge/scripts/tests/b8-obi.test.sh --level 1
      - name: b8-1.test.sh
        run: bash .forge/scripts/tests/b8-1.test.sh --level 1
      - name: b8-2.test.sh
        run: bash .forge/scripts/tests/b8-2.test.sh --level 1
      - name: b8-3.test.sh
        run: bash .forge/scripts/tests/b8-3.test.sh --level 1

  # ─── gates ── verify.sh + constitution-linter.sh ───────────────
  gates:
    name: Forge gates (verify + constitution-linter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PyYAML
        run: pip install pyyaml
      - name: verify.sh
        run: bash .forge/scripts/verify.sh
      - name: constitution-linter.sh
        run: bash .forge/scripts/constitution-linter.sh
      - name: forge-sbom.sh (J.8.d — CycloneDX 1.5)
        run: bash bin/forge-sbom.sh --target examples/forge-fsm-example/ --output sbom.cdx.json
      - uses: actions/upload-artifact@v4
        with: { name: sbom-cyclonedx, path: sbom.cdx.json, if-no-files-found: error }

  # ─── cli ── Vitest + lint + bundle ─────────────────────────────
  cli:
    name: CLI (npm test + bundle)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: cli/.nvmrc
          cache: npm
          cache-dependency-path: cli/package-lock.json
      - name: npm ci
        run: npm ci
      - name: npm run lint
        run: npm run lint
      - name: npm run bundle
        run: npm run bundle
      - name: npm test
        run: npm test

  # ─── lint ── shellcheck on Forge shell scripts ─────────────────
  lint:
    name: Shell lint (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck on .forge/scripts
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning
          scandir: ./.forge/scripts
      - name: shellcheck on bin
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning
          scandir: ./bin

  # ─── example ── validate examples/forge-fsm-example/ on touch ─
  # Added by c1-reference-project (FR-CI-012). Conditional on the
  # examples/** paths-filter ; on a miss, the job emits 'skipped'
  # which the summary treats as success (paths-filter mismatch is
  # not a failure).
  example:
    name: Example tree (examples/** paths-filter)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - id: examples-filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            examples:
              - 'examples/**'
      - uses: actions/setup-python@v5
        if: steps.examples-filter.outputs.examples == 'true'
        with:
          python-version: "3.11"
      - name: Install PyYAML
        if: steps.examples-filter.outputs.examples == 'true'
        run: pip install pyyaml
      - name: example verify.sh
        if: steps.examples-filter.outputs.examples == 'true'
        run: |
          cd examples/forge-fsm-example
          bash .forge/scripts/verify.sh
      - name: example constitution-linter.sh
        if: steps.examples-filter.outputs.examples == 'true'
        run: |
          cd examples/forge-fsm-example
          bash .forge/scripts/constitution-linter.sh
      - name: parse archetype workflow templates (yaml.safe_load)
        if: steps.examples-filter.outputs.examples == 'true'
        run: |
          python3 - <<'PY'
          import glob, sys, yaml
          paths = glob.glob('examples/forge-fsm-example/.forge/templates/archetypes/full-stack-monorepo/.github/workflows/*.yml.tmpl')
          if not paths:
              print('no archetype workflow templates found', file=sys.stderr); sys.exit(1)
          for p in paths:
              try:
                  yaml.safe_load(open(p).read())
              except Exception as e:
                  print(f'parse failed: {p}: {e}', file=sys.stderr); sys.exit(1)
              print(f'parsed: {p}')
          PY

  # ─── summary ── aggregator → single required status ───────────
  summary:
    name: Summary (required status)
    runs-on: ubuntu-latest
    needs: [harness, gates, cli, lint, example]
    if: always()
    steps:
      - name: Aggregate job results
        env:
          HARNESS_RESULT: ${{ needs.harness.result }}
          GATES_RESULT: ${{ needs.gates.result }}
          CLI_RESULT: ${{ needs.cli.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          EXAMPLE_RESULT: ${{ needs.example.result }}
        run: |
          set -eu
          declare -A results
          results[harness]="$HARNESS_RESULT"
          results[gates]="$GATES_RESULT"
          results[cli]="$CLI_RESULT"
          results[lint]="$LINT_RESULT"
          results[example]="$EXAMPLE_RESULT"

          # The four core jobs MUST be exactly 'success'. The example
          # job MAY be 'success' OR 'skipped' (paths-filter miss is
          # not a failure). Any other value on any job → fail.
          failed=()
          for job in harness gates cli lint; do
            if [ "${results[$job]}" != "success" ]; then
              failed+=("$job=${results[$job]}")
            fi
          done
          if [ "${results[example]}" != "success" ] && [ "${results[example]}" != "skipped" ]; then
            failed+=("example=${results[example]}")
          fi

          if [ "${#failed[@]}" -gt 0 ]; then
            echo "::error::forge-ci: ${failed[*]} FAILED"
            exit 1
          fi
          echo "::notice::forge-ci: 5/5 jobs PASS"
