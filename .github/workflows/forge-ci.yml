# <!-- Audit: G.1 (g1-forge-ci) -->
# Forge's own CI workflow. Standard:
# .forge/standards/global/forge-self-ci.md
#
# Runs the four shell test harnesses, the two deterministic gates,
# the CLI Vitest suite, and shellcheck on every PR + push to main.
# Aggregates the four worker jobs into a single required status
# `forge-ci / summary` for branch protection.
#
# Asymmetric concurrency (ADR-002): PR runs cancel in-progress to
# save CPU, but push:main runs do NOT cancel — partial main results
# matter, the next push will retrigger naturally.

name: forge-ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Single source of truth for cancel semantics: PRs cancel, main doesn't.
concurrency:
  group: forge-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Minimum permission set (Aegis hygiene, NFR-CI-005). No write access.
permissions:
  contents: read

jobs:
  # ─── harness ── all forge shell harnesses via a declarative loop ─
  harness:
    name: Test harnesses (all forge shell harnesses)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install PyYAML
        run: pip install pyyaml
      # b5.test.sh's Phase 2 tests exec node cli/dist/index.js — build it.
      - uses: actions/setup-node@v6
        with:
          node-version-file: cli/.nvmrc
          cache: npm
          cache-dependency-path: cli/package-lock.json
      - name: cli npm ci
        working-directory: cli
        run: npm ci
      - name: cli npm run bundle
        # Bundle (build + bundle-assets.mjs) — materialises `cli/assets/` mirror
        # (gitignored) required by `_test_t53_l1_011` (FR-T53-C-003).
        working-directory: cli
        run: npm run bundle
      - name: shell test harnesses
        # NFR-CI-002 — harnesses run via a declarative loop (not one step
        # each) so adding a harness is a one-line list entry and the
        # workflow no longer grows ~2 lines per harness. Each entry is the
        # exact invocation suffix; the loop runs every harness, collects
        # failures, and fails the job if any failed (full report, not
        # fail-fast). Entry order is load-bearing: sibling harnesses assert
        # presence (grep -F '<name>.test.sh') and adjacency (e.g.
        # t5-otel-traceparent-e2e after t5-otel-app).
        run: |
          set -uo pipefail
          harnesses=(
            "foundations.test.sh"
            "scaffolder.test.sh --level 1,2"
            "workflow.test.sh --level 1,2"
            "delivery.test.sh"
            "g1.test.sh"
            "c1.test.sh"
            "b7-7.test.sh"
            "a7.test.sh"
            "b5.test.sh"
            "d5.test.sh"
            "b4.test.sh --level 1,2"
            "f1.test.sh --level 1,2"
            "f2.test.sh --level 1,2"
            "f4.test.sh --level 1,2"
            "t4.test.sh --level 1,2"
            "t5.test.sh --level 1"
            "j7.test.sh --level 1,2"
            "t5-otel.test.sh --level 1"
            "t5-otel-app.test.sh --level 1"
            "t5-otel-traceparent-e2e.test.sh --level 1"
            "t5-otel-live-run.test.sh --level 1"
            "t5-2.test.sh --level 1"
            "t5-otel-dartastic.test.sh --level 1"
            "j8.test.sh --level 1,2"
            "k3.test.sh --level 1,2"
            "k5.test.sh --level 1,2"
            "i2.test.sh --level 1"
            "i6.test.sh --level 1,2"
            "i3.test.sh --level 1,2"
            "i5.test.sh --level 1"
            # b7-5/b6-9 live here by SUBSTANCE (compliance family), not by
            # their b7/b6 NUMBER (ADR-B75-004/ADR-B69-005).
            "b7-5.test.sh --level 1,2"
            "b6-9.test.sh --level 1,2"
            "f3.test.sh --level 1"
            "t5-1.test.sh --level 1"
            "t5-cargo.test.sh --level 1"
            "t5-bin-server.test.sh --level 1"
            "t5-3-1.test.sh --level 1"
            "t5-3-3.test.sh --level 1"
            "b8-coroot.test.sh --level 1"
            "b8-signoz.test.sh --level 1"
            "b8-obi.test.sh --level 1"
            "b8-1.test.sh --level 1"
            "b8-2.test.sh --level 1"
            "b8-3.test.sh --level 1"
            "b8-3b.test.sh --level 1"
            "b8-4.test.sh --level 1"
            "b8-5.test.sh --level 1"
            "b8-6.test.sh --level 1"
            "b8-7.test.sh --level 1"
            "b8-9.test.sh --level 1"
            "b8-10.test.sh --level 1"
            "b8-11.test.sh --level 1"
            "b8-12.test.sh --level 1"
            "b8-13.test.sh --level 1"
            "b8-14.test.sh --level 1"
            "b8-15.test.sh --level 1"
            "b8-14-flip.test.sh --level 1"
            "b8o.test.sh --level 1"
            "b7-1.test.sh --level 1,2"
            "b7-2a.test.sh --level 1,2"
            "b7-3.test.sh --level 1"
            "b7-2.test.sh --level 1"
            "b7-10.test.sh --level 1"
            "b7-9.test.sh --level 1,2"
            "b7-pythia.test.sh --level 1,2"
            # b7-6 (promotion gate) at --level 1 here: L1 + aggregation + held/
            # post-flip guards run buf-less/cargo-less. Its L2 live-codegen legs
            # (buf generate / cargo build / Qwik tsc) run in the harness-rust job.
            "b7-6.test.sh --level 1"
            # B.6 event-driven-eu chain (b6-1..b6-5). b6-2's L2 (cargo check) is
            # toolchain-gated/opt-in (no rust here). b6-4 is grep-only. b6-5's L2
            # is overlay+PyYAML only, skip-passes if PyYAML is absent.
            "b6-1.test.sh --level 1,2"
            "b6-2.test.sh --level 1"
            "b6-3.test.sh --level 1"
            "b6-4.test.sh --level 1,2"
            "b6-5.test.sh --level 1,2"
            # b6-6 Helm: L1 hermetic, L2 toolchain-gated/opt-in. b6-10 (Janus) is
            # hermetic grep+fixture, no toolchain needed.
            "b6-6.test.sh --level 1"
            "b6-10.test.sh --level 1,2"
            "k4.test.sh --level 1,2"
          )
          fail=0
          for entry in "${harnesses[@]}"; do
            echo "::group::${entry}"
            # shellcheck disable=SC2086
            if bash .forge/scripts/tests/${entry}; then
              echo "::endgroup::"
            else
              echo "::endgroup::"
              echo "::error::forge-ci harness failed: ${entry}"
              fail=1
            fi
          done
          exit "$fail"

  # ─── gates ── verify.sh + constitution-linter.sh ───────────────
  gates:
    name: Forge gates (verify + constitution-linter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install PyYAML
        run: pip install pyyaml
      - name: verify.sh
        run: bash .forge/scripts/verify.sh
      - name: constitution-linter.sh
        run: bash .forge/scripts/constitution-linter.sh
      - name: forge-sbom.sh (J.8.d — CycloneDX 1.5)
        run: bash bin/forge-sbom.sh --target examples/forge-fsm-example/ --output sbom.cdx.json
      - uses: actions/upload-artifact@v7
        with: { name: sbom-cyclonedx, path: sbom.cdx.json, if-no-files-found: error }

  # ─── cli ── Vitest + lint + bundle ─────────────────────────────
  cli:
    name: CLI (npm test + bundle)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: cli/.nvmrc
          cache: npm
          cache-dependency-path: cli/package-lock.json
      - name: npm ci
        run: npm ci
      - name: npm run lint
        run: npm run lint
      - name: npm run bundle
        run: npm run bundle
      - name: npm test
        run: npm test

  # ─── lint ── shellcheck on Forge shell scripts ─────────────────
  lint:
    name: Shell lint (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: shellcheck on .forge/scripts
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning
          scandir: ./.forge/scripts
      - name: shellcheck on bin
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning
          scandir: ./bin

  # ─── example ── validate examples/forge-fsm-example/ on touch ─
  # Added by c1-reference-project (FR-CI-012). Conditional on the
  # examples/** paths-filter ; on a miss, the job emits 'skipped'
  # which the summary treats as success (paths-filter mismatch is
  # not a failure).
  example:
    name: Example tree (examples/** paths-filter)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - id: examples-filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            examples:
              - 'examples/**'
      - uses: actions/setup-python@v6
        if: steps.examples-filter.outputs.examples == 'true'
        with:
          python-version: "3.11"
      - name: Install PyYAML
        if: steps.examples-filter.outputs.examples == 'true'
        run: pip install pyyaml
      - name: example verify.sh
        if: steps.examples-filter.outputs.examples == 'true'
        run: |
          cd examples/forge-fsm-example
          bash .forge/scripts/verify.sh
      - name: example constitution-linter.sh
        if: steps.examples-filter.outputs.examples == 'true'
        run: |
          cd examples/forge-fsm-example
          bash .forge/scripts/constitution-linter.sh
      - name: parse archetype workflow templates (yaml.safe_load)
        if: steps.examples-filter.outputs.examples == 'true'
        run: |
          python3 - <<'PY'
          import glob, sys, yaml
          paths = glob.glob('examples/forge-fsm-example/.forge/templates/archetypes/full-stack-monorepo/.github/workflows/*.yml.tmpl')
          if not paths:
              print('no archetype workflow templates found', file=sys.stderr); sys.exit(1)
          for p in paths:
              try:
                  yaml.safe_load(open(p).read())
              except Exception as e:
                  print(f'parse failed: {p}: {e}', file=sys.stderr); sys.exit(1)
              print(f'parsed: {p}')
          PY
      # ── RAG example gate (b7-7, MODIFIED FR-CI-012) — second tree under the
      #    same examples/** filter; parse-only / own-gates-only (ADR-B7-7-004).
      - name: rag-example gates
        if: steps.examples-filter.outputs.examples == 'true'
        run: |
          cd examples/forge-rag-example
          bash .forge/scripts/verify.sh
          bash .forge/scripts/constitution-linter.sh
      - name: parse rag example yaml (yaml.safe_load)
        if: steps.examples-filter.outputs.examples == 'true'
        run: |
          python3 - <<'PY'
          import glob, sys, yaml
          paths = (glob.glob('examples/forge-rag-example/infra/**/*.yaml', recursive=True)
                   + glob.glob('examples/forge-rag-example/shared/protos/*.yaml'))
          if not paths:
              print('no rag example YAML found', file=sys.stderr); sys.exit(1)
          for p in paths:
              try:
                  yaml.safe_load(open(p).read())
              except Exception as e:
                  print(f'parse failed: {p}: {e}', file=sys.stderr); sys.exit(1)
              print(f'parsed: {p}')
          PY

  # ─── harness-rust ── b7-6 live codegen/build gate (buf + Rust + node) ─
  # The ai-native-rag promotion gate (B.7.6, ADR-B7-6-005 / Q-B option b). The
  # main `harness` job runs b7-6 at --level 1 (buf-less L1 + aggregation + held
  # guards); THIS job installs buf + a Rust toolchain + node and runs b7-6 at
  # --level 1,2 so the LIVE legs run: `buf generate` (proto → Rust + TS stubs),
  # `cargo build`/`test` of the rendered backend workspace, and the Qwik tsc
  # ride-along. This is the permanent per-PR gate that justifies the
  # candidate→stable/scaffoldable:true flip — the live path proven on every PR.
  harness-rust:
    name: ai-native-rag live codegen+build (b7-6 L2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install PyYAML
        run: pip install pyyaml
      - uses: actions/setup-node@v6
        with:
          node-version-file: cli/.nvmrc
      # Install the buf CLI only (setup_only) — b7-6's L2 legs call `buf generate`
      # directly against the rendered proto (the remote BSR es/tonic plugins are
      # pinned in buf.gen.yaml.tmpl). Pinned CLI version for reproducible codegen.
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
          version: "1.70.0"
      - uses: dtolnay/rust-toolchain@stable
      - name: b7-6 live codegen + build (--level 1,2)
        run: bash .forge/scripts/tests/b7-6.test.sh --level 1,2

  # ─── summary ── aggregator → single required status ───────────
  summary:
    name: Summary (required status)
    runs-on: ubuntu-latest
    needs: [harness, gates, cli, lint, example, harness-rust]
    if: always()
    steps:
      - name: Aggregate job results
        env:
          HARNESS_RESULT: ${{ needs.harness.result }}
          GATES_RESULT: ${{ needs.gates.result }}
          CLI_RESULT: ${{ needs.cli.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          EXAMPLE_RESULT: ${{ needs.example.result }}
          HARNESS_RUST_RESULT: ${{ needs.harness-rust.result }}
        run: |
          set -eu
          declare -A results
          results[harness]="$HARNESS_RESULT"
          results[gates]="$GATES_RESULT"
          results[cli]="$CLI_RESULT"
          results[lint]="$LINT_RESULT"
          results[example]="$EXAMPLE_RESULT"
          results[harness-rust]="$HARNESS_RUST_RESULT"

          # The five core jobs MUST be exactly 'success' (harness-rust is the
          # b7-6 live codegen/build gate). The example job MAY be 'success' OR
          # 'skipped' (paths-filter miss is not a failure). Any other value on
          # any job → fail.
          failed=()
          for job in harness gates cli lint harness-rust; do
            if [ "${results[$job]}" != "success" ]; then
              failed+=("$job=${results[$job]}")
            fi
          done
          if [ "${results[example]}" != "success" ] && [ "${results[example]}" != "skipped" ]; then
            failed+=("example=${results[example]}")
          fi

          if [ "${#failed[@]}" -gt 0 ]; then
            echo "::error::forge-ci: ${failed[*]} FAILED"
            exit 1
          fi
          echo "::notice::forge-ci: 6/6 jobs PASS"
